
# Reduce node serialization timeout
healenium.nodepath.script.timeout=5000

# Increase replay attempts but with backoff
healenium.replay.count=2
healenium.replay.interval=500

# Disable learning for volatile elements (Flutter views)
healenium.learning.enabled=true
healenium.learning.disable.for.cache.miss=true

recovery-tries = 1
score-cap = 0.5
heal-enabled = true
hlm.server.url = http://localhost:7878
hlm.imitator.url = http://localhost:8000